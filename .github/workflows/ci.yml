name: CI

on:
  push:
    branches: ["main", "fix/**", "feat/**", "chore/**"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown,wasm32v1-none
          components: rustfmt,clippy,rust-src

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Build (native)
        run: cargo build --workspace

      - name: Build campaign WASM
        run: cargo build -p orbitchain-campaign --target wasm32-unknown-unknown --release

      - name: Run contract tests
        run: |
          cargo test -p orbitchain-campaign
          cargo test -p orbitchain-core
          cargo test -p orbitchain-common
          cargo test -p orbitchain-token-bridge
