name: CI

# Lock the token down — this workflow only reads the repo.
permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  # Cancel superseded PR runs but never cancel the push-to-main run
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: short

jobs:
  fmt:
    name: Format check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        # Honors rust-toolchain.toml (channel + targets + components)
        uses: dtolnay/rust-toolchain@stable
        with:
          # No `cache: true` here — Swatinem/rust-cache handles caching below.
          cache: false
      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - name: cargo fmt --check
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          cache: false
      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Tests (host target)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          cache: false
      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - name: cargo test --workspace
        run: cargo test --workspace

  wasm-check:
    name: WASM compile check
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain with wasm target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          cache: false
      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - name: cargo check --workspace --target wasm32-unknown-unknown
        run: cargo check --workspace --target wasm32-unknown-unknown
